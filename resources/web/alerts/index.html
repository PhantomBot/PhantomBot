<!DOCTYPE html>

<html lang="en">
<head>
    <!-- Title -->
    <title>PhantomBot Alerts</title>
    <link rel="stylesheet" href="/alerts/css/animate.min.css"/>
    <!-- Main styles. -->
    <style>
        :root {
            --fade-time: 200ms;
        }

        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #browser-interaction-button {
            top: 50vh;
            position: absolute;
            font-size: 2em;
            cursor: pointer;
            margin: 0 25vw
        }

        #alerts-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #alert-image,
        #alert-video,
        #alert-text {
            max-width: 100%;
            height: auto;
            display: none;
            margin: 0 auto;
        }

        video.fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            opacity: 1 !important;
        }

        #text-alert-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #alert-text {
            text-align: center;
        }

        #emotes-container {
            position: absolute;
            left: 0;
            top: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        .animated-emote {
            position: fixed;
        }
        
        .fade-in {
          opacity: 1 !important;
          transition: opacity var(--fade-time) ease-in;
        }

        .fade-out {
          opacity: 0 !important;
          transition: opacity var(--fade-time) ease-out;
        }
    </style>

    <!-- Load our favicon -->
    <link rel="icon" href="/favicon.ico"/>
</head>

<!-- Main body -->
<body>
    <div id="emotes-container">
        <!-- Where the emotes are played. -->
    </div>
    <div id="alerts-container">
        <!-- Where the gif gets played. -->
        <img id="alert-image"></img>
        <audio id="alert-audio" autoplay="false"></audio>
        <!-- Where the video clips are played. -->
        <video id="alert-video" autoplay="false"></video>   
    </div>
    <div id="text-alert-container">
        <!-- Where the custom text for alerts is displayed. -->
        <div id="alert-text"></div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha384-i61gTtaoovXtAbKjo903+O55Jkn2+RtzHtvNez+yI49HAASvznhe9sZyjaSHTau9" crossorigin="anonymous"></script>
    <!-- Vanilla JS Keyframes -->
    <script src="/alerts/js/keyframes.dist.js"></script>
    <!-- Bot config file -->
    <script src="/common/js/wsConfig.js"></script>
    <!-- Reconnecting socket -->
    <script src="/common/reconnecting-websocket/reconnectingWS.min.js"></script>
    <!-- File that handles alerts -->
    <script src="/alerts/js/index.js"></script>
</body>
</html>
